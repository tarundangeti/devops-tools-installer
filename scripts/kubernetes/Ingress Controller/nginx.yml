apiVersion: apps/v1
kind: Deployment
metadata: 
  name: nginx
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginxcont
          image: nginx
          ports:
            - ContainerPort: 80
          env:
            - name: TITLE
              value: "NGINX APP1"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  tyep: ClusterIP
  ports:
    - port: 80
  selector:
    app: nginx
    
