apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd
  labels:
    app: httpd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpd
  template:
    metadata:
      labels:
        app: httpd
    spec:
      containers:
        - name: apachecont
          image: httpd
          ports:
            containerPort: 80
          env:
            - name: TITLE
              value: "APACHE APP2"
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: httpd
  spec:
    type: ClusterIP
    ports:
      port: 80
    selector:
      app: httpd
